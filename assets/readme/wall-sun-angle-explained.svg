<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img">

<style>
  .bg { fill: #17202b; }
  .panel { fill: #233041; stroke: rgba(255,255,255,.14); stroke-width: 2; }
  .panel2 { fill: #1d2938; stroke: rgba(255,255,255,.10); stroke-width: 2; }
  .title { fill: #f4f7fb; font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .subtitle { fill: #b8c3d0; font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .h { fill: #f4f7fb; font: 800 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .body { fill: #b8c3d0; font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .small { fill: #b8c3d0; font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .label { fill: #f4f7fb; font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .value { fill: #f4f7fb; font: 800 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .yellow { fill: #ffd43b; }
  .blue { fill: #65b7ff; }
  .green { fill: #8bd17c; }
  .orange { fill: #ff9f43; }
  .red { fill: #ff6b6b; }
  .stroke-yellow { stroke: #ffd43b; }
  .stroke-blue { stroke: #65b7ff; }
  .stroke-green { stroke: #8bd17c; }
  .stroke-orange { stroke: #ff9f43; }
  .stroke-muted { stroke: #b8c3d0; }
  .stroke-line { stroke: #405066; }
  text { dominant-baseline: middle; }
</style>

<rect class="bg" width="900" height="500"/>
<text class="title" x="52" y="54">Wall Sun Angle = how low the sun enters</text>
<text class="subtitle" x="52" y="86">The value is high when sunlight can travel deeper into the room.</text>
<rect class="panel" x="52" y="125" width="380" height="305" rx="24"/>
<text class="h" x="82" y="160">High sun</text>
<line x1="250" y1="218" x2="250" y2="356" stroke="#ffffff" stroke-width="10"/>
<rect x="246" y="235" width="12" height="54" fill="#9ed8f5"/>
<line x1="250" y1="356" x2="360" y2="356" stroke="#405066" stroke-width="8" stroke-linecap="round"/>
<path d="M178 156 L245 255" stroke="#ffd43b" stroke-width="8" stroke-linecap="round"/>
<path d="M255 272 L310 354" stroke="#ffd43b" stroke-width="6" stroke-linecap="round" opacity=".55"/>
<text class="value blue" x="84" y="350">30°</text>
<text class="body" x="84" y="382">Less deep glare risk.</text>
<rect class="panel" x="468" y="125" width="380" height="305" rx="24"/>
<text class="h" x="498" y="160">Low sun</text>
<line x1="666" y1="218" x2="666" y2="356" stroke="#ffffff" stroke-width="10"/>
<rect x="662" y="235" width="12" height="54" fill="#9ed8f5"/>
<line x1="666" y1="356" x2="790" y2="356" stroke="#405066" stroke-width="8" stroke-linecap="round"/>
<path d="M505 254 L658 281" stroke="#ffd43b" stroke-width="8" stroke-linecap="round"/>
<path d="M670 283 L812 308" stroke="#ffd43b" stroke-width="6" stroke-linecap="round" opacity=".75"/>
<text class="value blue" x="500" y="350">80°</text>
<text class="body" x="500" y="382">Deeper glare risk.</text>
<text class="small" x="52" y="462">0° means the wall is not lit, or the sun is below the horizon.</text>

</svg>
