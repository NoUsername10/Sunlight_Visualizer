<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" role="img">

<style>
  .bg { fill: #17202b; }
  .panel { fill: #233041; stroke: rgba(255,255,255,.14); stroke-width: 2; }
  .panel2 { fill: #1d2938; stroke: rgba(255,255,255,.10); stroke-width: 2; }
  .title { fill: #f4f7fb; font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .subtitle { fill: #b8c3d0; font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .h { fill: #f4f7fb; font: 800 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .body { fill: #b8c3d0; font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .small { fill: #b8c3d0; font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .label { fill: #f4f7fb; font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .value { fill: #f4f7fb; font: 800 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .yellow { fill: #ffd43b; }
  .blue { fill: #65b7ff; }
  .green { fill: #8bd17c; }
  .orange { fill: #ff9f43; }
  .red { fill: #ff6b6b; }
  .stroke-yellow { stroke: #ffd43b; }
  .stroke-blue { stroke: #65b7ff; }
  .stroke-green { stroke: #8bd17c; }
  .stroke-orange { stroke: #ff9f43; }
  .stroke-muted { stroke: #b8c3d0; }
  .stroke-line { stroke: #405066; }
  text { dominant-baseline: middle; }
</style>

<rect class="bg" width="900" height="500"/>
<text class="title" x="52" y="54">Radiation Direct vs Total</text>
<text class="subtitle" x="52" y="86">These are different on purpose.</text>
<rect class="panel" x="52" y="125" width="380" height="285" rx="24"/>
<text class="h" x="82" y="160">Radiation Direct</text>
<text class="body" x="82" y="190">Straight sun hitting the wall.</text>
<line x1="135.0" y1="254.7" x2="135.0" y2="232.0" stroke="#ffd43b" stroke-width="6" stroke-linecap="round" opacity=".75"/>
<line x1="157.0" y1="264.0" x2="173.0" y2="248.0" stroke="#ffd43b" stroke-width="6" stroke-linecap="round" opacity=".75"/>
<line x1="166.3" y1="286.0" x2="189.0" y2="286.0" stroke="#ffd43b" stroke-width="6" stroke-linecap="round" opacity=".75"/>
<line x1="157.0" y1="308.0" x2="173.0" y2="324.0" stroke="#ffd43b" stroke-width="6" stroke-linecap="round" opacity=".75"/>
<line x1="135.0" y1="317.3" x2="135.0" y2="340.0" stroke="#ffd43b" stroke-width="6" stroke-linecap="round" opacity=".75"/>
<line x1="113.0" y1="308.0" x2="97.0" y2="324.0" stroke="#ffd43b" stroke-width="6" stroke-linecap="round" opacity=".75"/>
<line x1="103.7" y1="286.0" x2="81.0" y2="286.0" stroke="#ffd43b" stroke-width="6" stroke-linecap="round" opacity=".75"/>
<line x1="113.0" y1="264.0" x2="97.0" y2="248.0" stroke="#ffd43b" stroke-width="6" stroke-linecap="round" opacity=".75"/>
<circle cx="135" cy="286" r="23" fill="#ffd43b"/><circle cx="135" cy="286" r="13.34" fill="#fff06a" opacity=".9"/>
<rect x="310" y="210" width="20" height="150" fill="#ffffff" rx="4"/>
<path d="M170 286 L302 268" stroke="#ffd43b" stroke-width="10" stroke-linecap="round"/>
<text class="small" x="82" y="382">Best for glare and shading logic.</text>
<rect class="panel" x="468" y="125" width="380" height="285" rx="24"/>
<text class="h" x="498" y="160">Radiation Total</text>
<text class="body" x="498" y="190">Direct + sky diffuse + ground reflection.</text>
<path d="M540 282 L735 252" stroke="#ffd43b" stroke-width="8" stroke-linecap="round"/>
<path d="M545 232 C610 205 670 205 730 232" fill="none" stroke="#65b7ff" stroke-width="7" stroke-linecap="round" opacity=".8"/>
<path d="M545 350 C620 315 685 315 740 350" fill="none" stroke="#8bd17c" stroke-width="7" stroke-linecap="round" opacity=".8"/>
<rect x="755" y="210" width="20" height="150" fill="#ffffff" rx="4"/>
<text class="small" x="498" y="382">Good for weather/energy overview.</text>
<rect class="panel2" x="178" y="432" width="544" height="42" rx="21"/>
<text class="h" x="230" y="453">Total = Direct + Diffuse + Reflected</text>

</svg>
